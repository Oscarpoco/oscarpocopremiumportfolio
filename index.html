<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,
  <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
    <text y='0.9em' font-size='90'>☠️</text>
  </svg>"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oscar Poco</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Roboto", sans-serif;
      }

      body {
        background: radial-gradient(circle at top, #0f172a, #020617);
        color: #fff;
        overflow-x: hidden;
      }

      /* Animated gradient glow */
      .bg-glow {
        position: fixed;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(0, 255, 255, 0.2),
          transparent
        );
        top: -100px;
        left: -100px;
        filter: blur(120px);
        animation: float 8s ease-in-out infinite alternate;
        z-index: -1;
      }

      @keyframes float {
        0% {
          transform: translate(0, 0);
        }
        100% {
          transform: translate(200px, 150px);
        }
      }

      /* Loader */
      #loader {
        position: fixed;
        inset: 0;
        background: #020617;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999999;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-top: 4px solid cyan;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ===== CLICK EFFECTS ===== */

      /* Click ripple effect */
      .click-ripple {
        position: fixed;
        border-radius: 50%;
        border: 2px solid rgba(0, 255, 255, 0.8);
        pointer-events: none;
        z-index: 9999;
      }

      @keyframes ripple-expand {
        0% {
          transform: scale(0);
          opacity: 1;
        }
        100% {
          transform: scale(1);
          opacity: 0;
        }
      }

      /* Particle effect */
      .particle {
        position: fixed;
        pointer-events: none;
        z-index: 9998;
      }

      .particle-dot {
        width: 4px;
        height: 4px;
        background: #00ffff;
        border-radius: 50%;
        box-shadow: 0 0 8px rgba(0, 255, 255, 0.8);
      }

    </style>
  </head>

  <body>
    <div id="loader">
      <div class="spinner"></div>
    </div>

    <div class="bg-glow"></div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Fake loader
      window.addEventListener("load", () => {
        setTimeout(() => {
          document.getElementById("loader").style.display = "none";
        }, 800);
      });

      // ===== CLICK EFFECTS ONLY =====
      
      // Click ripple and particles
      document.addEventListener("click", (e) => {
        createRipple(e.clientX, e.clientY);
        createParticleBurst(e.clientX, e.clientY);
      });

      // Ripple effect
      function createRipple(x, y) {
        const ripple = document.createElement("div");
        ripple.className = "click-ripple";
        ripple.style.left = x + "px";
        ripple.style.top = y + "px";
        ripple.style.width = "20px";
        ripple.style.height = "20px";
        ripple.style.marginLeft = "-10px";
        ripple.style.marginTop = "-10px";
        
        document.body.appendChild(ripple);
        
        ripple.style.animation = "ripple-expand 0.8s ease-out forwards";
        
        setTimeout(() => ripple.remove(), 800);
      }

      // Particle burst effect
      function createParticleBurst(x, y) {
        const particleCount = 12;
        
        for (let i = 0; i < particleCount; i++) {
          const angle = (i / particleCount) * Math.PI * 2;
          const velocity = 3 + Math.random() * 3;
          const vx = Math.cos(angle) * velocity;
          const vy = Math.sin(angle) * velocity;
          
          createParticle(x, y, vx, vy);
        }
      }

      // Single particle
      function createParticle(x, y, vx, vy) {
        const particle = document.createElement("div");
        particle.className = "particle";
        
        const dot = document.createElement("div");
        dot.className = "particle-dot";
        particle.appendChild(dot);
        
        particle.style.left = x + "px";
        particle.style.top = y + "px";
        document.body.appendChild(particle);
        
        let px = x;
        let py = y;
        let currentVx = vx;
        let currentVy = vy;
        let life = 1;
        const decay = 0.02;
        
        function animateParticle() {
          if (life <= 0) {
            particle.remove();
            return;
          }
          
          // Apply velocity with gravity
          currentVy += 0.15; // gravity
          px += currentVx;
          py += currentVy;
          life -= decay;
          
          particle.style.left = px + "px";
          particle.style.top = py + "px";
          particle.style.opacity = life;
          
          requestAnimationFrame(animateParticle);
        }
        
        animateParticle();
      }

      // Animated typing title effect
      const titles = [
        "Oscar Poco ",
        "Full Stack Developer "
      ];

      let titleIndex = 0;
      let charIndex = 0;
      let isDeleting = false;

      function typeEffect() {
        const current = titles[titleIndex];

        if (isDeleting) {
          document.title = current.substring(0, charIndex--);
        } else {
          document.title = current.substring(0, charIndex++);
        }

        let speed = isDeleting ? 50 : 100;

        if (!isDeleting && charIndex === current.length) {
          speed = 1500; // pause at full text
          isDeleting = true;
        } else if (isDeleting && charIndex === 0) {
          isDeleting = false;
          titleIndex = (titleIndex + 1) % titles.length;
          speed = 500;
        }

        setTimeout(typeEffect, speed);
      }

      typeEffect();
    </script>
  </body>
</html>
